<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamGrid — Real-Time Global Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <style>
    :root { --panel-bg: rgba(16,18,27,0.92); --accent: #4fc3f7; --text: #e0e0e0; --dim: #666; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a14; color: var(--text); overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    /* Stats bar */
    #topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 36px; background: var(--panel-bg); border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 16px; font-size: 12px; gap: 24px; backdrop-filter: blur(8px); }
    #topbar .brand { color: var(--accent); font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }
    #topbar .stat { color: var(--dim); }
    #topbar .stat b { color: #0f0; font-weight: 600; margin-left: 4px; }
    #topbar .stat.warn b { color: #f90; }
    #topbar .sep { width: 1px; height: 18px; background: #333; }

    /* Detail panel */
    #panel { position: fixed; top: 36px; right: 0; bottom: 0; width: 320px; background: var(--panel-bg); border-left: 1px solid #222; z-index: 900; transform: translateX(100%); transition: transform 0.25s ease; backdrop-filter: blur(8px); overflow-y: auto; }
    #panel.open { transform: translateX(0); }
    #panel .header { padding: 16px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    #panel .header h3 { font-size: 14px; color: var(--accent); }
    #panel .close { background: none; border: none; color: #888; font-size: 18px; cursor: pointer; padding: 4px 8px; }
    #panel .close:hover { color: #fff; }
    #panel .field { padding: 8px 16px; display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a2a; }
    #panel .field .label { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    #panel .field .value { font-size: 13px; font-weight: 500; }

    /* Legend */
    #legend { position: fixed; bottom: 20px; left: 12px; z-index: 800; background: var(--panel-bg); padding: 10px 14px; border-radius: 6px; font-size: 11px; backdrop-filter: blur(8px); }
    #legend .item { display: flex; align-items: center; margin: 3px 0; gap: 6px; }

    .maplibregl-ctrl-attrib { font-size: 10px !important; }
  </style>
</head>
<body>
  <div id="topbar">
    <span class="brand">STREAMGRID</span>
    <div class="sep"></div>
    <span class="stat">Status:<b id="st-status">Connecting</b></span>
    <span class="stat">Entities:<b id="st-total">0</b></span>
    <span class="stat">✈️<b id="st-ac">0</b></span>
    <span class="stat">🚢<b id="st-vs">0</b></span>
    <span class="stat">FPS:<b id="st-fps">0</b></span>
    <span class="stat">BW:<b id="st-bw">0</b> KB/s</span>
  </div>

  <div id="map"></div>

  <div id="panel">
    <div class="header">
      <h3 id="panel-title">Entity Details</h3>
      <button class="close" onclick="closePanel()">✕</button>
    </div>
    <div id="panel-body"></div>
  </div>

  <div id="legend">
    <div class="item"><svg width="14" height="14" viewBox="0 0 24 24"><path d="M12 2L4 14h4v8h8v-8h4z" fill="#4488ff"/></svg> Aircraft</div>
    <div class="item"><svg width="14" height="14" viewBox="0 0 24 24"><path d="M12 2L6 10h4v10h4V10h4z" fill="#44cc88"/></svg> Vessel</div>
  </div>

  <script>
    // === CONFIG ===
    const ENTITY_SIZE = 64, FRAME_HEADER = 16, MAGIC = 0x53475246;
    const wsUrl = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws`;

    // === MAP ===
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          'carto-dark': {
            type: 'raster',
            tiles: ['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
            tileSize: 256,
            attribution: '&copy; CARTO &copy; OSM contributors'
          }
        },
        layers: [{ id: 'carto', type: 'raster', source: 'carto-dark' }]
      },
      center: [20, 20],
      zoom: 2,
      maxZoom: 16,
      attributionControl: false
    });
    map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');
    map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

    // === ICONS (canvas-rendered, synchronous) ===
    const ICON_SIZE = 32;

    function makeArrowIcon(color) {
      const size = ICON_SIZE;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      // Aircraft arrow pointing UP
      ctx.translate(size/2, size/2);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, -12);   // nose
      ctx.lineTo(-5, 8);    // left wing
      ctx.lineTo(-2, 5);
      ctx.lineTo(-2, 12);   // left tail
      ctx.lineTo(2, 12);    // right tail
      ctx.lineTo(2, 5);
      ctx.lineTo(5, 8);     // right wing
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      return ctx.getImageData(0, 0, size, size);
    }

    function makeShipIcon(color) {
      const size = ICON_SIZE;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.translate(size/2, size/2);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, -10);   // bow
      ctx.lineTo(-4, -2);
      ctx.lineTo(-4, 8);    // stern left
      ctx.lineTo(4, 8);     // stern right
      ctx.lineTo(4, -2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      return ctx.getImageData(0, 0, size, size);
    }

    function loadIcons() {
      map.addImage('aircraft', makeArrowIcon('#4488ff'), { pixelRatio: 2 });
      map.addImage('aircraft_high', makeArrowIcon('#8844ff'), { pixelRatio: 2 });
      map.addImage('aircraft_low', makeArrowIcon('#44ccff'), { pixelRatio: 2 });
      map.addImage('vessel', makeShipIcon('#44cc88'), { pixelRatio: 2 });
      map.addImage('vessel_fast', makeShipIcon('#ffcc33'), { pixelRatio: 2 });
    }

    // === DATA ===
    let entities = null, entityCount = 0, aircraftCount = 0, vesselCount = 0;
    let frameCount = 0, bytesTotal = 0, lastStatsTime = performance.now(), lastFrameCount = 0, lastBytes = 0;
    let selectedEntity = null;
    let geojson = { type: 'FeatureCollection', features: [] };

    // === MAP LAYERS ===
    map.on('load', () => {
      loadIcons();

      map.addSource('entities', { type: 'geojson', data: geojson, buffer: 0, tolerance: 0.5 });

      // Aircraft symbol layer with rotation
      map.addLayer({
        id: 'aircraft-layer',
        type: 'symbol',
        source: 'entities',
        filter: ['==', ['get', 'type'], 1],
        layout: {
          'icon-image': ['case',
            ['>', ['get', 'alt'], 10000], 'aircraft_high',
            ['<', ['get', 'alt'], 3000], 'aircraft_low',
            'aircraft'
          ],
          'icon-size': ['interpolate', ['linear'], ['zoom'], 2, 0.5, 5, 0.7, 8, 1.0, 12, 1.2],
          'icon-rotate': ['get', 'hdg'],
          'icon-rotation-alignment': 'map',
          'icon-allow-overlap': true,
          'icon-ignore-placement': true,
        },
        paint: { 'icon-opacity': 0.9 }
      });

      // Vessel symbol layer with rotation
      map.addLayer({
        id: 'vessel-layer',
        type: 'symbol',
        source: 'entities',
        filter: ['==', ['get', 'type'], 2],
        layout: {
          'icon-image': ['case', ['>', ['get', 'spd'], 5], 'vessel_fast', 'vessel'],
          'icon-size': ['interpolate', ['linear'], ['zoom'], 2, 0.5, 5, 0.6, 8, 0.9, 12, 1.1],
          'icon-rotate': ['get', 'hdg'],
          'icon-rotation-alignment': 'map',
          'icon-allow-overlap': true,
          'icon-ignore-placement': true,
        },
        paint: { 'icon-opacity': 0.85 }
      });

      // Click handlers
      map.on('click', 'aircraft-layer', (e) => showPanel(e.features[0]));
      map.on('click', 'vessel-layer', (e) => showPanel(e.features[0]));
      map.on('mouseenter', 'aircraft-layer', () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', 'aircraft-layer', () => map.getCanvas().style.cursor = '');
      map.on('mouseenter', 'vessel-layer', () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', 'vessel-layer', () => map.getCanvas().style.cursor = '');

      connect();
    });

    // === DETAIL PANEL ===
    function showPanel(feature) {
      const p = feature.properties;
      const isAircraft = p.type === 1;
      const panel = document.getElementById('panel');
      const title = document.getElementById('panel-title');
      const body = document.getElementById('panel-body');

      title.textContent = isAircraft ? `✈️ Aircraft` : `🚢 Vessel`;

      const fields = isAircraft ? [
        ['ICAO', p.id.toString(16).toUpperCase().padStart(6, '0')],
        ['Altitude', `${Math.round(p.alt)} m (${Math.round(p.alt * 3.28084)} ft)`],
        ['Speed', `${p.spd.toFixed(1)} m/s (${(p.spd * 1.94384).toFixed(0)} kt)`],
        ['Heading', `${Math.round(p.hdg)}°`],
        ['Position', `${feature.geometry.coordinates[1].toFixed(4)}°, ${feature.geometry.coordinates[0].toFixed(4)}°`],
      ] : [
        ['MMSI', p.id.toString().padStart(9, '0')],
        ['Speed', `${p.spd.toFixed(1)} m/s (${(p.spd * 1.94384).toFixed(0)} kt)`],
        ['Heading', `${Math.round(p.hdg)}°`],
        ['Position', `${feature.geometry.coordinates[1].toFixed(4)}°, ${feature.geometry.coordinates[0].toFixed(4)}°`],
      ];

      body.innerHTML = fields.map(([label, value]) =>
        `<div class="field"><span class="label">${label}</span><span class="value">${value}</span></div>`
      ).join('');

      panel.classList.add('open');
    }

    function closePanel() { document.getElementById('panel').classList.remove('open'); }

    // === WEBSOCKET ===
    let ws = null;
    function connect() {
      ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';
      ws.onopen = () => { document.getElementById('st-status').textContent = 'Live'; document.getElementById('st-status').style.color = '#0f0'; };
      ws.onmessage = (e) => {
        if (!(e.data instanceof ArrayBuffer) || e.data.byteLength < FRAME_HEADER) return;
        const view = new DataView(e.data);
        if (view.getUint32(0, true) !== MAGIC) return;
        entityCount = view.getUint16(6, true);
        frameCount++;
        bytesTotal += e.data.byteLength;
        updateMap(view, entityCount, e.data.byteLength);
      };
      ws.onclose = () => { document.getElementById('st-status').textContent = 'Reconnecting'; document.getElementById('st-status').style.color = '#f90'; setTimeout(connect, 2000); };
      ws.onerror = () => {};
    }

    function updateMap(view, count, byteLen) {
      const features = [];
      let ac = 0, vs = 0;
      for (let i = 0; i < count; i++) {
        const off = FRAME_HEADER + i * ENTITY_SIZE;
        if (off + ENTITY_SIZE > byteLen) break;
        const flags = view.getUint16(off + 4, true);
        if (!(flags & 0x02)) continue;
        const type = view.getUint8(off + 6);
        const lat = view.getFloat64(off + 16, true);
        const lon = view.getFloat64(off + 24, true);
        if ((lat === 0 && lon === 0) || lat < -90 || lat > 90 || lon < -180 || lon > 180) continue;
        const id = view.getUint32(off, true);
        const alt = Math.round(view.getFloat32(off + 32, true));
        const spd = parseFloat(view.getFloat32(off + 36, true).toFixed(1));
        const hdg = Math.round(view.getFloat32(off + 40, true));
        if (type === 1) ac++; else if (type === 2) vs++;
        features.push({ type: 'Feature', geometry: { type: 'Point', coordinates: [lon, lat] }, properties: { id, type, alt, spd, hdg } });
      }
      aircraftCount = ac; vesselCount = vs;
      geojson = { type: 'FeatureCollection', features };
      const src = map.getSource('entities');
      if (src) src.setData(geojson);
    }

    // === STATS ===
    setInterval(() => {
      const now = performance.now(), elapsed = (now - lastStatsTime) / 1000;
      const fps = (frameCount - lastFrameCount) / elapsed;
      const bw = (bytesTotal - lastBytes) / elapsed / 1024;
      document.getElementById('st-total').textContent = entityCount.toLocaleString();
      document.getElementById('st-ac').textContent = aircraftCount.toLocaleString();
      document.getElementById('st-vs').textContent = vesselCount.toLocaleString();
      document.getElementById('st-fps').textContent = fps.toFixed(1);
      document.getElementById('st-bw').textContent = bw.toFixed(0);
      lastStatsTime = now; lastFrameCount = frameCount; lastBytes = bytesTotal;
    }, 1000);
  </script>
</body>
</html>
