<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamGrid Runtime</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #map { width: 100vw; height: 100vh; }
    #stats {
      position: fixed; top: 12px; left: 12px; z-index: 1000;
      background: rgba(0,0,0,0.85); color: #eee;
      padding: 12px 16px; border-radius: 8px;
      font-size: 13px; line-height: 1.7;
      font-family: 'SF Mono', Monaco, monospace;
      min-width: 240px; pointer-events: none;
    }
    #stats .header { color: #4fc3f7; font-weight: bold; margin-bottom: 4px; font-size: 14px; }
    #stats .label { color: #999; }
    #stats .value { color: #0f0; font-weight: bold; }
    #stats .value.warn { color: #f90; }
    #stats .value.err { color: #f55; }
    #legend {
      position: fixed; bottom: 30px; left: 12px; z-index: 1000;
      background: rgba(0,0,0,0.85); color: #eee;
      padding: 10px 14px; border-radius: 8px; font-size: 12px;
    }
    #legend .item { display: flex; align-items: center; margin: 3px 0; }
    #legend .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="stats">
    <div class="header">StreamGrid Runtime</div>
    <div><span class="label">Status: </span><span class="value" id="st-status">Connecting...</span></div>
    <div><span class="label">Entities: </span><span class="value" id="st-entities">0</span></div>
    <div><span class="label">Aircraft: </span><span class="value" id="st-aircraft">0</span></div>
    <div><span class="label">Vessels: </span><span class="value" id="st-vessels">0</span></div>
    <div><span class="label">Frames/s: </span><span class="value" id="st-fps">0</span></div>
    <div><span class="label">Bandwidth: </span><span class="value" id="st-bw">0</span> KB/s</div>
  </div>

  <div id="legend">
    <div class="item"><div class="dot" style="background:#4488ff"></div>Aircraft</div>
    <div class="item"><div class="dot" style="background:#44cc88"></div>Vessel</div>
    <div class="item"><div class="dot" style="background:#ffcc33"></div>Vehicle</div>
    <div class="item"><div class="dot" style="background:#ff6666"></div>Drone</div>
    <div class="item"><div class="dot" style="background:#aaaaaa"></div>Other</div>
  </div>

  <script>
    // --- Config ---
    const ENTITY_SIZE = 64;
    const FRAME_HEADER = 16;
    const MAGIC = 0x53475246;
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProto}//${location.host}/ws`;

    // Entity type colors
    const TYPE_COLORS = { 1: '#4488ff', 2: '#44cc88', 3: '#ffcc33', 5: '#ff6666' };
    const DEFAULT_COLOR = '#aaaaaa';

    // --- Map ---
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          'osm-raster': {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '&copy; OpenStreetMap contributors'
          }
        },
        layers: [{
          id: 'osm-raster-layer',
          type: 'raster',
          source: 'osm-raster',
          minzoom: 0,
          maxzoom: 19
        }]
      },
      center: [135, -25], // Australia
      zoom: 3,
      attributionControl: true
    });

    // --- GeoJSON source for entities ---
    let geojsonData = { type: 'FeatureCollection', features: [] };

    map.on('load', () => {
      // Add entity source
      map.addSource('entities', {
        type: 'geojson',
        data: geojsonData
      });

      // Aircraft layer (circles)
      map.addLayer({
        id: 'entities-aircraft',
        type: 'circle',
        source: 'entities',
        filter: ['==', ['get', 'entityType'], 1],
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 2, 2, 6, 4, 10, 6],
          'circle-color': '#4488ff',
          'circle-opacity': 0.85,
          'circle-stroke-width': 0.5,
          'circle-stroke-color': '#ffffff'
        }
      });

      // Vessel layer
      map.addLayer({
        id: 'entities-vessel',
        type: 'circle',
        source: 'entities',
        filter: ['==', ['get', 'entityType'], 2],
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 2, 2, 6, 3, 10, 5],
          'circle-color': '#44cc88',
          'circle-opacity': 0.85,
          'circle-stroke-width': 0.5,
          'circle-stroke-color': '#ffffff'
        }
      });

      // Other entities
      map.addLayer({
        id: 'entities-other',
        type: 'circle',
        source: 'entities',
        filter: ['all',
          ['!=', ['get', 'entityType'], 1],
          ['!=', ['get', 'entityType'], 2]
        ],
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 2, 2, 6, 3, 10, 5],
          'circle-color': ['match', ['get', 'entityType'],
            3, '#ffcc33',
            5, '#ff6666',
            '#aaaaaa'
          ],
          'circle-opacity': 0.8
        }
      });

      // Popup on click
      map.on('click', 'entities-aircraft', (e) => {
        const props = e.features[0].properties;
        new maplibregl.Popup()
          .setLngLat(e.lngLat)
          .setHTML(`<b>Aircraft</b><br>ID: ${props.entityId}<br>Alt: ${props.altitude}m<br>Speed: ${props.speed} m/s<br>Heading: ${props.heading}°`)
          .addTo(map);
      });
      map.on('click', 'entities-vessel', (e) => {
        const props = e.features[0].properties;
        new maplibregl.Popup()
          .setLngLat(e.lngLat)
          .setHTML(`<b>Vessel</b><br>MMSI: ${props.entityId}<br>Speed: ${props.speed} m/s<br>Heading: ${props.heading}°`)
          .addTo(map);
      });

      // Cursor
      map.on('mouseenter', 'entities-aircraft', () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', 'entities-aircraft', () => map.getCanvas().style.cursor = '');
      map.on('mouseenter', 'entities-vessel', () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', 'entities-vessel', () => map.getCanvas().style.cursor = '');

      // Start WebSocket connection after map is ready
      connect();
    });

    // --- WebSocket ---
    let ws = null;
    let entityCount = 0;
    let aircraftCount = 0;
    let vesselCount = 0;
    let frameCount = 0;
    let bytesTotal = 0;
    let lastStatsTime = performance.now();
    let lastFrameCount = 0;
    let lastBytes = 0;

    function connect() {
      if (ws) { ws.close(); ws = null; }

      document.getElementById('st-status').textContent = 'Connecting...';
      document.getElementById('st-status').className = 'value warn';

      ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        document.getElementById('st-status').textContent = 'Connected';
        document.getElementById('st-status').className = 'value';
      };

      ws.onmessage = (event) => {
        if (!(event.data instanceof ArrayBuffer)) return;
        const data = event.data;
        if (data.byteLength < FRAME_HEADER) return;

        const view = new DataView(data);
        const magic = view.getUint32(0, true);
        if (magic !== MAGIC) return;

        const count = view.getUint16(6, true);
        entityCount = count;
        frameCount++;
        bytesTotal += data.byteLength;

        // Parse entities into GeoJSON
        updateGeoJSON(view, count, data.byteLength);
      };

      ws.onerror = () => {
        document.getElementById('st-status').textContent = 'Error';
        document.getElementById('st-status').className = 'value err';
      };

      ws.onclose = () => {
        document.getElementById('st-status').textContent = 'Reconnecting...';
        document.getElementById('st-status').className = 'value warn';
        setTimeout(connect, 3000);
      };
    }

    function updateGeoJSON(view, count, byteLength) {
      const features = [];
      let ac = 0, vs = 0;

      for (let i = 0; i < count; i++) {
        const off = FRAME_HEADER + i * ENTITY_SIZE;
        if (off + ENTITY_SIZE > byteLength) break;

        const flags = view.getUint16(off + 4, true);
        if (!(flags & 0x02)) continue; // position not valid

        const entityType = view.getUint8(off + 6);
        const lat = view.getFloat64(off + 16, true);
        const lon = view.getFloat64(off + 24, true);

        if (lat === 0 && lon === 0) continue;
        if (lat < -90 || lat > 90 || lon < -180 || lon > 180) continue;

        const entityId = view.getUint32(off, true);
        const altitude = Math.round(view.getFloat32(off + 32, true));
        const speed = view.getFloat32(off + 36, true).toFixed(1);
        const heading = Math.round(view.getFloat32(off + 40, true));

        if (entityType === 1) ac++;
        else if (entityType === 2) vs++;

        features.push({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [lon, lat] },
          properties: { entityId, entityType, altitude, speed, heading }
        });
      }

      aircraftCount = ac;
      vesselCount = vs;

      geojsonData = { type: 'FeatureCollection', features };

      const src = map.getSource('entities');
      if (src) src.setData(geojsonData);
    }

    // --- Stats ---
    setInterval(() => {
      const now = performance.now();
      const elapsed = (now - lastStatsTime) / 1000;
      const fps = (frameCount - lastFrameCount) / elapsed;
      const bw = (bytesTotal - lastBytes) / elapsed / 1024;

      document.getElementById('st-entities').textContent = entityCount.toLocaleString();
      document.getElementById('st-aircraft').textContent = aircraftCount.toLocaleString();
      document.getElementById('st-vessels').textContent = vesselCount.toLocaleString();
      document.getElementById('st-fps').textContent = fps.toFixed(1);
      document.getElementById('st-bw').textContent = bw.toFixed(0);

      lastStatsTime = now;
      lastFrameCount = frameCount;
      lastBytes = bytesTotal;
    }, 1000);
  </script>
</body>
</html>
