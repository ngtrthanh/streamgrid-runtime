services:
  edge:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8088:8080"
      - "4433:4433/udp"
      - "4433:4433/tcp"
    command:
      - "-ws-addr"
      - ":8080"
      - "-rate"
      - "${UPDATE_RATE:-2}"
      - "-beast"
      - "${BEAST_ADDR:-10.99.0.1:33005}"
      - "-nmea"
      - "${NMEA_ADDR:-host.docker.internal:5015}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
